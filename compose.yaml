services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8099:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8099
      DB_CONNECTION: sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_RECORDS_INDEX: ariadne_portal
      OPENSEARCH_SUBJECTS_INDEX: ariadne_subjects
      OPENSEARCH_PERIODS_INDEX: ariadne_periods
      OPENSEARCH_AAT_DESCENDANTS_INDEX: ariadne_aat_term_descendants
      OPENSEARCH_SERVICES_INDEX: ariadne_services
      OPENSEARCH_PUBLISHERS_INDEX: ariadne_publishers
      ARIADNE_PORTAL_SOURCE_URL: https://portal.ariadne-infrastructure.eu
      FILAMENT_ADMIN_NAME: admin
      FILAMENT_ADMIN_EMAIL: admin@admin.local
      FILAMENT_ADMIN_PASSWORD: admin
    depends_on:
      opensearch:
        condition: service_healthy

  opensearch:
    image: opensearchproject/opensearch:latest
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  opensearch-data:
